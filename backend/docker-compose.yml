services:
  mysql:
    image: mysql:8.4
    container_name: prolog-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: prolog
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - prolog-mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - prolog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prolog-redis
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - prolog-network

networks:
  prolog-network:
    driver: bridge

volumes:
  prolog-mysql-data:
